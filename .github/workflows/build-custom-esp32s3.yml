name: Build Custom ESP32-S3 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ESP-IDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build \
            python3-pip libusb-1.0-0 wget flex bison \
            gperf ccache libffi-dev libssl-dev dfu-util

      - name: Clone ESP-IDF
        run: |
          git clone --depth 1 --branch v5.1.2 \
            https://github.com/espressif/esp-idf.git $HOME/esp-idf
          cd $HOME/esp-idf && ./install.sh esp32s3

      - name: Build nanoFramework ESP32_S3_ALL
        run: |
          . $HOME/esp-idf/export.sh

          # Mostrar opciones validas de RTOS en el log
          echo "=== Opciones RTOS en CMakeLists.txt ==="
          grep -n "RTOS" CMakeLists.txt | head -30

          cmake -S . -B build/ESP32_S3_ALL \
            -DCMAKE_TOOLCHAIN_FILE=CMake/toolchain.esp32.cmake \
            -DTARGET=ESP32_S3_ALL \
            -DTARGET_BOARD=ESP32_S3_ALL \
            -DRTOS=FreeRTOS \
            -DESP32_IDF_PATH=$HOME/esp-idf \
            -DTOOLCHAIN_PREFIX=$HOME/.espressif/tools/xtensa-esp32s3-elf/esp-12.2.0_20230208/xtensa-esp32s3-elf \
            -G Ninja
          cmake --build build/ESP32_S3_ALL

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESP32_S3_ALL_PSRAM_custom
          path: build/ESP32_S3_ALL/nanoCLR.bin
          retention-days: 30
