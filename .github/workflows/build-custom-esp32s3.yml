name: Build Custom ESP32-S3 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ninja-build \
            python3-pip libusb-1.0-0 wget flex bison \
            gperf ccache libffi-dev libssl-dev dfu-util
          pip install cmake==3.30.5

      - name: Clone ESP-IDF
        run: |
          git clone --depth 1 --branch v5.1.2 \
            https://github.com/espressif/esp-idf.git $HOME/esp-idf
          cd $HOME/esp-idf && ./install.sh esp32s3

      - name: Prepare build directory
        run: |
          # Crear archivos que el build necesita escribir en el source tree
          mkdir -p build
          touch build/sdkconfig.default
          touch sdkconfig

      - name: Build
        run: |
          export PATH=$HOME/.local/bin:$PATH
          . $HOME/esp-idf/export.sh
          export PATH=$HOME/.espressif/tools/xtensa-esp32s3-elf/esp-12.2.0_20230208/xtensa-esp32s3-elf/bin:$PATH

          cmake -S . -B build/ESP32_S3 \
            -DCMAKE_TOOLCHAIN_FILE=CMake/toolchain.xtensa-esp32s3-elf.cmake \
            -DTARGET_BOARD=ESP32_S3 \
            -DTARGET_SERIES=ESP32_S3 \
            -DRTOS=ESP32 \
            -DESP32_IDF_PATH=$HOME/esp-idf \
            -DTOOLCHAIN_PREFIX=$HOME/.espressif/tools/xtensa-esp32s3-elf/esp-12.2.0_20230208/xtensa-esp32s3-elf/bin/xtensa-esp32s3-elf \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DNF_FEATURE_WATCHDOG=ON \
            -G Ninja

          cmake --build build/ESP32_S3

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ESP32_S3_PSRAM_custom
          path: build/ESP32_S3/nanoCLR.bin
          retention-days: 30
